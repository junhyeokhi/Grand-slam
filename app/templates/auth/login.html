{% extends "base.html" %} {% block content %}
<div class="login-page">
  <div class="login-container">
    <!-- 왼쪽 영역 -->
    <section class="left-section">
      <div class="image-box">
        <img
          src="https://cdn.ticketbay.co.kr/images/login/img_intro_01.png"
          alt="이미지"
        />
      </div>

      <h1 class="main-title">
        거래 수수료<br />
        완전 무료
      </h1>

      <p class="sub-text">
        정가 이하 티켓 거래의 경우<br />
        구매자와 판매자 모두 수수료를 면제해요
      </p>
    </section>

    <!-- 가운데 구분선 -->
    <div class="divider"></div>

    <!-- 오른쪽 영역 -->
    <section class="right-section">
      <h2 class="logo-text">Grand Slam</h2>

      <form class="login-form" method="post" action="">
        <div class="input-group">
          <label for="email">아이디(이메일)</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="아이디(이메일) 입력"
          />
        </div>

        <div class="input-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호 입력"
          />
        </div>

        <div class="save-id">
          <input type="checkbox" id="saveId" name="saveId" />
          <label for="saveId">아이디 저장</label>
        </div>

        <button type="submit" class="btn btn-login">로그인</button>
        <button type="button" class="btn btn-kakao">
          카카오 1초로그인/회원가입
        </button>
        <button type="button" class="btn btn-email">이메일로 회원가입</button>

        <div class="social-login">
          <a href="#" class="social-btn">N</a>
          <a href="#" class="social-btn">G</a>
          <a href="#" class="social-btn">A</a>
        </div>
      </form>
    </section>
  </div>
</div>

{% endblock %}
