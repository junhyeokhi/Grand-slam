{% extends "base.html" %} {% block title %}1:1 문의하기{% endblock %} {% block content %}
<div class="container my-5" style="max-width: 800px">
  <h2 class="border-bottom pb-3 fw-bold">1:1 문의하기</h2>
  <p class="text-muted mb-4">궁금하신 점을 남겨주시면 담당자가 확인 후 빠른 시일 내에 답변드리겠습니다.</p>

  <form method="post" class="card shadow-sm p-4">
    <div class="mb-3">
      <label for="subject" class="form-label fw-bold">문의 제목</label>
      <input type="text" class="form-control" name="subject" id="subject" placeholder="예: 티켓 전달이 안 되었어요." required />
    </div>

    <div class="mb-3">
      <label for="ticket_id" class="form-label fw-bold">관련 거래 상품 (선택사항)</label>
      <select name="ticket_id" id="ticket_id" class="form-select">
        <option value="">일반 문의 (선택 안함)</option>
        <optgroup label="구매한 상품 내역">
          {% for order in purchased_orders %}
          <option value="{{ order.ticket.id }}">
            [구매] {{ order.ticket.Hometeam_name }} vs {{ order.ticket.awayteam_name }} | 경기일 : ({{ order.ticket.game_date.strftime('%Y-%m-%d') }})
          </option>
          {% endfor %}
        </optgroup>
        <optgroup label="판매한 상품 내역">
          {% for ticket in sold_tickets %}
          <option value="{{ ticket.id }}">
            [판매] {{ ticket.Hometeam_name }} vs {{ ticket.awayteam_name }} | 경기일 : ({{ ticket.game_date.strftime('%Y-%m-%d') }})
          </option>
          {% endfor %}
        </optgroup>
      </select>
    </div>

    <div class="mb-4">
      <label for="content" class="form-label fw-bold">문의 내용</label>
      <textarea class="form-control" name="content" id="content" rows="10" placeholder="상세한 내용을 입력해주세요." required></textarea>
    </div>

    <div class="d-flex gap-2">
      <a href="{{ url_for('auth.mypage') }}" class="btn btn-outline-secondary w-25">취소</a>
      <button type="submit" class="btn btn-primary w-75">문의 등록하기</button>
    </div>
  </form>
</div>
{% endblock %}
