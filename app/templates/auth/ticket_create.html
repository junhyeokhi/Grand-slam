{% extends "base.html" %} {% block content %}
<div class="container my-5">
  <div class="row g-5">
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm p-4 bg-white">
        <h4 class="fw-bold mb-4">티켓 판매 등록</h4>
        <form method="post" id="ticketForm">
          <div class="mb-3">
            <label class="form-label fw-bold small">홈팀 (장소)</label>
            <select
              name="hometeam"
              id="hometeam"
              class="form-select rounded-0"
              required
            >
              <option value="">구단 선택</option>
              {% for team in teams %}
              <option value="{{ team.name }}">{{ team.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">상대팀</label>
            <select
              name="awayteam"
              id="awayteam"
              class="form-select rounded-0"
              required
            >
              <option value="">구단 선택</option>
              {% for team in teams %}
              <option value="{{ team.name }}">{{ team.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">좌석 등급</label>
            <select
              name="seat_grade"
              id="seat_grade"
              class="form-select rounded-0"
              required
              disabled
            >
              <option value="">구단을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">상세 위치</label>
            <input
              type="text"
              name="seat"
              id="seat_detail"
              class="form-control rounded-0"
              placeholder="예: 202블록 7열 12번"
            />
          </div>

          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-bold small">수량</label>
              <input
                type="number"
                name="quantity"
                id="quantity"
                class="form-control rounded-0"
                value="1"
              />
            </div>
            <div class="col-6 mb-3">
              <label class="form-label fw-bold small">가격 (1매당)</label>
              <input
                type="number"
                name="price"
                id="price"
                class="form-control rounded-0"
                placeholder="0"
              />
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-dark w-100 rounded-0 mt-3 py-3 fw-bold"
          >
            판매 등록하기
          </button>
        </form>
      </div>
    </div>

    <div class="col-lg-7 d-none d-lg-block">
      <div class="sticky-top" style="top: 100px">
        <p class="text-muted small fw-bold mb-3">
          <i class="bi bi-eye"></i> 티켓 프리뷰
        </p>

        <div
          class="d-flex shadow-lg overflow-hidden"
          style="min-height: 200px; border-radius: 4px"
        >
          <div
            class="bg-white p-4 flex-grow-1 border-end border-dashed position-relative"
          >
            <div class="badge bg-danger rounded-0 mb-2">MATCH DAY</div>
            <div class="h3 fw-bold mb-1">
              <span id="pv-home">HOME</span>
              <span class="text-muted small">vs</span>
              <span id="pv-away">AWAY</span>
            </div>
            <div class="text-muted small mb-3" id="pv-date">
              2026.04.09 (KST)
            </div>
            <hr />
            <div class="row">
              <div class="col-8">
                <div class="small text-muted">SEAT INFO</div>
                <div class="fw-bold h5 mb-0">
                  <span id="pv-grade">좌석등급</span> /
                  <span id="pv-seat">상세위치</span>
                </div>
              </div>
              <div class="col-4 text-end">
                <div class="small text-muted">PRICE</div>
                <div class="fw-bold h5 text-primary" id="pv-price">0원</div>
              </div>
            </div>
          </div>
          <div
            class="bg-dark text-white p-4 d-flex flex-column justify-content-center align-items-center"
            style="width: 180px"
          >
            <div class="small opacity-50 mb-1">QUANTITY</div>
            <div class="h4 fw-bold" id="pv-qty">1매</div>
            <div
              class="mt-4 border border-secondary px-2 py-1 small opacity-50"
            >
              GrandSlam
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
    // 구단별 좌석 등급 데이터 불러와서 정의
    const teamData = {{ teams | tojson }};

    const homeSelect = document.getElementById('hometeam');
    const awaySelect = document.getElementById('awayteam');
    const gradeSelect = document.getElementById('seat_grade');

    //  홈팀 선택 시 좌석 등급 업데이트
    homeSelect.addEventListener('change', function() {
      const selectedHome = this.value; // 선택된 홈팀 이름
      const selectedTeam = teamData.find(t => t.name === selectedHome);

          // 좌석 등급 업데이트 로직
        gradeSelect.innerHTML = '<option value="">좌석 선택</option>';

        if (selectedTeam) {
            selectedTeam.seat_grades.forEach(grade => {
                const opt = document.createElement('option');
                opt.value = grade;
                opt.textContent = grade;
                gradeSelect.appendChild(opt);
            });
            gradeSelect.disabled = false;
            document.getElementById('pv-home').textContent = this.value;
        } else {
            gradeSelect.disabled = true;
        }

      //상대팀 선택시 홈팀 선택팀 제외 로직
          Array.from(awaySelect.options).forEach(option => {
              if (option.value === selectedHome) {
                  option.disabled = true;
                  option.selected = false;
              } else {
                  option.disabled = false;
              }
          });
    });
    // 입력폼 업데이트시 티켓 프리뷰 업데이트
    document.getElementById('ticketForm').addEventListener('input', function(e) {
          if(e.target.id === 'seat_grade') document.getElementById('pv-grade').textContent = e.target.value;
          if(e.target.id === 'seat_detail') document.getElementById('pv-seat').textContent = e.target.value;
          if(e.target.id === 'quantity') document.getElementById('pv-qty').textContent = e.target.value + '매';
          if(e.target.id === 'price') document.getElementById('pv-price').textContent = Number(e.target.value ).toLocaleString() + '원';


      });
      // 상대팀 선택시 프리뷰 업데이트
      awaySelect.addEventListener('change', function() {
      document.getElementById('pv-away').textContent = this.value || "AWAY";
  });
</script>
{% endblock %}
