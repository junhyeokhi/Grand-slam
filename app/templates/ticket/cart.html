{% extends "base.html" %}
{% block title %}장바구니{% endblock %}

{% block content %}
<style>
    .custom-hover-link {
        transition: color 0.2s ease;
        display: inline-block;
    }

    .custom-hover-link:hover {
        color: #0d6efd !important;
        text-decoration: underline !important;
    }
</style>

<div class="container py-5">
    <h2 class="fw-bold mb-4">🛒 장바구니</h2>

    <div id="empty-cart" class="text-center py-5" style="display: none;">
        <p class="text-muted fs-5 mb-4">장바구니에 담긴 티켓이 없습니다.</p>
        <a href="{{ url_for('ticket.ticket_list') }}" class="btn btn-outline-primary px-4 py-2">
            티켓 둘러보기
        </a>
    </div>

    <div id="cart-content" style="display: none;">
        <div class="table-responsive shadow-sm rounded">
            <table class="table table-hover align-middle text-center mb-0 bg-white">
                <thead class="table-light">
                    <tr>
                        <th>경기 정보</th>
                        <th>수량</th>
                        <th>한 매 가격</th>
                        <th>총 가격</th>
                        <th>삭제</th>
                    </tr>
                </thead>
                <tbody id="cart-tbody">
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-end align-items-center mt-4 p-4 bg-light rounded shadow-sm">
            <h4 class="fw-bold me-4 mb-0">총 결제 금액: <span id="total-price" class="text-danger">0</span>원</h4>
            <button class="btn btn-dark btn-lg px-5" onclick="checkout()">결제하기</button>
        </div>
    </div>
</div>

<script>
    // 페이지가 열리면 바로 장바구니를 그립니다.
    document.addEventListener('DOMContentLoaded', function () {
        renderCart();
    });

    // 로컬 스토리지에서 데이터를 읽어 화면에 그려주는 핵심 함수
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const emptyCartDiv = document.getElementById('empty-cart');
        const cartContentDiv = document.getElementById('cart-content');
        const tbody = document.getElementById('cart-tbody');
        const totalPriceSpan = document.getElementById('total-price');

        // 데이터가 없으면 '비어있음' 화면 표시
        if (cart.length === 0) {
            emptyCartDiv.style.display = 'block';
            cartContentDiv.style.display = 'none';
            return;
        }

        // 데이터가 있으면 표(Table) 표시
        emptyCartDiv.style.display = 'none';
        cartContentDiv.style.display = 'block';

        // 기존 테이블 내용 비우기
        tbody.innerHTML = '';
        let totalPrice = 0;

        // 장바구니 배열을 돌면서 HTML 줄(tr)을 만듭니다. (✅ 중복 수정 완료)
        cart.forEach((item, index) => {
            const itemTotalPrice = item.price * item.quantity;
            totalPrice += itemTotalPrice;

            const tr = document.createElement('tr');
            tr.innerHTML = `
        <td class="text-start ps-4">
            <a href="/ticket/ticket_detail/${item.id}/" class="text-decoration-none text-dark custom-hover-link">
  <div class="fw-bold fs-5">${item.homeTeam} <span class="text-muted fs-6">vs</span> ${item.awayTeam}</div>
  <small class="text-muted">티켓 ID: ${item.id}</small>
</a>
        </td>
        <td><strong>${item.quantity}</strong> 매</td>
        <td>${item.price.toLocaleString()}원</td>
        <td class="text-primary fw-bold">${itemTotalPrice.toLocaleString()}원</td>
        <td>
          <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})">삭제</button>
        </td>
      `;
            tbody.appendChild(tr);
        });

        // 총 금액 찍어주기
        totalPriceSpan.innerText = totalPrice.toLocaleString();
    }

    // 특정 항목 삭제 함수
    function removeItem(index) {
        if (confirm("이 티켓을 장바구니에서 삭제하시겠습니까?")) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1); // 배열에서 해당 번째 데이터 1개 삭제
            localStorage.setItem('cart', JSON.stringify(cart)); // 변경된 배열 다시 저장

            renderCart(); // 화면 다시 그리기

            const headerCartCount = document.getElementById('cart-count');
            if (headerCartCount) headerCartCount.innerText = cart.length;
        }
    }

    // 결제하기 버튼
    function checkout() {
        alert("장바구니 결제 로직을 연결할 자리입니다!");
    }
</script>
{% endblock %}
