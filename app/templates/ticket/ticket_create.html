{% extends "base.html" %} {% block content %}
<div class="container my-5">
  <div class="row g-5">
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm p-4 bg-white">
        {# 티켓의 객체가 존재한다면 수정 아니라면 등록 #}
        <h4 class="fw-bold mb-4">{% if ticket %}티켓 판매 수정{% else %}티켓 판매 등록{% endif %}</h4>
        <form method="post" id="ticketForm">
          <div class="mb-3">
            <label class="form-label fw-bold small">홈팀 (장소)</label>
            <select name="hometeam" id="hometeam" class="form-select rounded-0" required>
              <option value="">구단 선택</option>
              {% for team in teams %}
              <option value="{{ team.name }}">{{ team.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">경기 정보 (장소 및 요일)</label>
            <select name="sub_category" id="sub_category" class="form-select rounded-0" required disabled>
              <option value="">구단을 먼저 선택하세요</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">상대팀</label>
            <select name="awayteam" id="awayteam" class="form-select rounded-0" required>
              <option value="">구단 선택</option>
              {% for team in teams %}
              <option value="{{ team.name }}">{{ team.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">경기 일자</label>
            <input type="date" name="game_date" id="game_date" class="form-control rounded-0" required />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">경기 시간</label>
            <div class="d-flex gap-2">
              <select name="game_time_hour" id="game_time_hour" class="form-select rounded-0" required>
                <option value="">시</option>
                {% for h in range(24) %}
                <option value="{{ '%02d' | format(h) }}">{{ '%02d' | format(h) }}</option>
                {% endfor %}
              </select>
              <select name="game_time_minute" id="game_time_minute" class="form-select rounded-0" required>
                <option value="">분</option>
                {% for m in [0, 10, 20, 30, 40, 50] %}
                <option value="{{ '%02d' | format(m) }}">{{ '%02d' | format(m) }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">좌석 등급</label>
            <select name="seat_grade" id="seat_grade" class="form-select rounded-0" required disabled>
              <option value="">경기 정보를 먼저 선택하세요</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">상세 위치</label>
            <input type="text" name="seat" id="seat_detail" class="form-control rounded-0" placeholder="예: 202블록 7열 12번" required />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">PIN 번호</label>
            <input type="text" name="pin" id="pin_number" class="form-control rounded-0" placeholder="PIN 번호를 입력해주세요" required />
          </div>

          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-bold small">수량</label>
              <input type="number" name="quantity" id="quantity" class="form-control rounded-0" value="1" />
            </div>
            <div class="col-6 mb-3">
              <label class="form-label fw-bold small">가격 (1매당)</label>
              <input type="number" name="price" id="price" class="form-control rounded-0" placeholder="0" />
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 rounded-0 mt-3 py-3 fw-bold">
            {# 티켓 객체가 있다면 수정버튼 아니라면 등록버튼 #} {% if ticket %}수정 완료하기{% else %}판매 등록하기{% endif %}
          </button>
        </form>
      </div>
    </div>

    <div class="col-lg-7 d-none d-lg-block">
      <div class="sticky-top" style="top: 100px">
        <p class="text-muted small fw-bold mb-3"><i class="bi bi-ticket-perforated-fill"></i> 티켓 프리뷰</p>

        <div class="d-flex shadow-lg overflow-hidden" style="min-height: 200px; border-radius: 4px">
          <div class="bg-white p-4 flex-grow-1 border-end border-dashed position-relative">
            <div id="pv-badge" class="badge rounded-0 mb-2" style="background-color: #dc3545; transition: background-color 0.3s ease">MATCH DAY</div>
            <div class="d-flex align-items-center h3 fw-bold mb-1">
              <img
                id="pv-home-logo"
                src=""
                alt="Home Logo"
                style="width: 35px; height: 35px; object-fit: cover; display: none"
                class="rounded-circle shadow-sm me-2"
              />
              <span id="pv-home">HOME</span>
              <span class="text-muted small mx-2">vs</span>
              <span id="pv-away">AWAY</span>
              <img
                id="pv-away-logo"
                src=""
                alt="Away Logo"
                style="width: 35px; height: 35px; object-fit: cover; display: none"
                class="rounded-circle shadow-sm ms-2"
              />
            </div>
            <div class="text-muted small mb-3">
              <span id="pv-date">경기 일자 선택 전</span>
              <span id="pv-time" class="ms-2"></span>
            </div>
            <hr />
            <div class="row">
              <div class="col-8">
                <div class="small text-muted mb-1">SEAT INFO</div>
                <div class="text-primary fw-bold mb-1" id="pv-sub" style="font-size: 0.9rem; letter-spacing: -0.5px">경기정보</div>
                <div class="fw-bold h4 mb-0">
                  <span id="pv-grade">좌석등급</span>
                  <span class="text-muted mx-2 fw-light"></span><br />
                  <span id="pv-seat" class="h5 mb-0">상세위치</span>
                </div>
              </div>
              <div class="col-4 text-end">
                <div class="small text-muted">PRICE</div>
                <div class="fw-bold h5 text-primary" id="pv-price">0원</div>
              </div>
            </div>
          </div>
          <div
            id="pv-theme-bg"
            class="text-white p-4 d-flex flex-column justify-content-center align-items-center"
            style="width: 180px; background-color: #212529; transition: background-color 0.3s ease"
          >
            <div class="small opacity-50 mb-1">QUANTITY</div>
            <div class="h4 fw-bold" id="pv-qty">1매</div>
            <div class="mt-4 border border-secondary px-2 py-1 small opacity-50">GrandSlam</div>
          </div>
        </div>
        <div class="mt-4 p-3 bg-light border rounded-3 text-muted small d-flex align-items-center shadow-sm">
          <i class="bi bi-info-circle-fill text-primary me-2 fs-5"></i>
          <span>티켓 정보를 정확하게 입력하셔야 <strong>판매 가능성</strong>이 높아집니다.</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 구단별 좌석 등급 데이터 불러와서 정의
  const teamData = {{ teams | tojson }};

  // 이미지 경로 기본 URL (Flask의 url_for 활용)
  const imgBaseUrl = "{{ url_for('static', filename='img/') }}";

  // DOM 요소 선택
  const homeSelect = document.getElementById('hometeam');
  const subSelect = document.getElementById('sub_category');
  const awaySelect = document.getElementById('awayteam');
  const dateInput = document.getElementById('game_date');
  const hourSelect = document.getElementById('game_time_hour');
  const minuteSelect = document.getElementById('game_time_minute');
  const gradeSelect = document.getElementById('seat_grade');
  const ticketForm = document.getElementById('ticketForm');

  // KBO 구단별 대표 상징색 정의
  const teamColors = {
      '두산베어스': '#131230',  // 네이비
      'LG트윈스': '#C30452',   // 크림슨 레드
      '한화이글스': '#FF6600',  // 오렌지
      'SSG랜더스': '#CE0E2D',  // 레드
      '삼성라이온즈': '#074CA1', // 블루
      'NC다이노스': '#071D3F',  // 네이비 블루
      'KTwiz': '#000000',      // 블랙
      '롯데자이언츠': '#002955', // 네이비 (혹은 레드)
      'KIA타이거즈': '#EA0029', // 레드
      '키움히어로즈': '#570514'  // 버건디
  };

  // 홈팀 선택 시 좌석 등급 업데이트
  homeSelect.addEventListener('change', function() {
      const selectedHome = this.value; // 선택된 홈팀 이름
      const selectedTeam = teamData.find(t => t.name === selectedHome);

      // 좌석 등급 업데이트 로직 (초기화)
      subSelect.innerHTML = '<option value="">경기 정보 선택</option>';
      gradeSelect.innerHTML = '<option value="">좌석 선택</option>';
      gradeSelect.disabled = true;

      // 프리뷰 초기화
      document.getElementById('pv-home').textContent = selectedHome || "HOME";
      document.getElementById('pv-sub').textContent = "경기정보";
      document.getElementById('pv-grade').textContent = "좌석등급";

      // 홈팀 로고 업데이트
      const homeLogo = document.getElementById('pv-home-logo');
      if (selectedHome) {
          homeLogo.src = imgBaseUrl + selectedHome + '.jpg';
          homeLogo.style.display = 'inline-block';
      } else {
          homeLogo.style.display = 'none';
      }

      // 프리뷰 배경색을 선택한 홈팀의 상징색으로 변경
      const selectedColor = teamColors[selectedHome] || '#212529'; // 매칭 안될시 기본 어두운 회색
      document.getElementById('pv-theme-bg').style.backgroundColor = selectedColor;
      document.getElementById('pv-badge').style.backgroundColor = selectedColor;

      if (selectedTeam) {
          // constants.py 데이터 기반 경기장/요일 정보 생성
          selectedTeam.sub_options.forEach(opt => {
              const option = document.createElement('option');
              option.value = opt;
              option.textContent = opt;
              subSelect.appendChild(option);
          });
          subSelect.disabled = false;
      } else {
          subSelect.disabled = true;
      }

      // 상대팀 선택시 홈팀 선택팀 제외 로직
      Array.from(awaySelect.options).forEach(option => {
          if (option.value === selectedHome) {
              option.disabled = true;
              option.selected = false;
          } else {
              option.disabled = false;
          }
      });
  });

  // 경기 정보 선택 시 좌석 등급 업데이트
  subSelect.addEventListener('change', function() {
      const selectedHome = homeSelect.value;
      const selectedTeam = teamData.find(t => t.name === selectedHome);

      // 프리뷰 업데이트 (1층)
      document.getElementById('pv-sub').textContent = this.value || "경기정보";
      document.getElementById('pv-grade').textContent = "좌석등급"; // 좌석정보 초기화

      if (this.value && selectedTeam) {
          gradeSelect.innerHTML = '<option value="">좌석 선택</option>';
          selectedTeam.seat_grades.forEach(grade => {
              const opt = document.createElement('option');
              opt.value = grade; // 옵션의 실제 값
              opt.textContent = grade; // 사용자에게 보여질 텍스트
              gradeSelect.appendChild(opt);
          });
          gradeSelect.disabled = false;
      } else {
          gradeSelect.disabled = true;
      }
  });

  // 3. 상대팀 및 좌석등급, 날짜 선택 (change 이벤트)
  awaySelect.addEventListener('change', function() {
      document.getElementById('pv-away').textContent = this.value || "AWAY";

      // 원정팀 로고 업데이트
      const awayLogo = document.getElementById('pv-away-logo');
      if (this.value) {
          awayLogo.src = imgBaseUrl + this.value + '.jpg';
          awayLogo.style.display = 'inline-block';
      } else {
          awayLogo.style.display = 'none';
      }
  });

  gradeSelect.addEventListener('change', function() {
      document.getElementById('pv-grade').textContent = this.value || "좌석등급";
  });

  dateInput.addEventListener('change', function() {
      const val = this.value; // yyyy-mm-dd 형식
      if(val) {
          const formattedDate = val.replace(/-/g, '.'); // 2026.04.13 형식으로 변환
          document.getElementById('pv-date').textContent = formattedDate + " (KST)";
      } else {
          document.getElementById('pv-date').textContent = "경기 일자 선택 전";
      }
  });

  // 경기 시간 (시/분) 선택 시 프리뷰 업데이트
  function updateTimePreview() {
      const hour = hourSelect.value;
      const minute = minuteSelect.value;
      const pvTimeElement = document.getElementById('pv-time');

      if (hour && minute) {
          pvTimeElement.textContent = `${hour}:${minute}`;
      } else {
          pvTimeElement.textContent = ""; // 시 또는 분이 선택되지 않으면 비움
      }
  }

  hourSelect.addEventListener('change', updateTimePreview);
  minuteSelect.addEventListener('change', updateTimePreview);
  // 4. 입력창들 (input 이벤트 - 타이핑 시 즉각 반영)

  // 경기 일자 최소값을 오늘 날짜로 설정 (과거 날짜 선택 방지)
  document.addEventListener('DOMContentLoaded', function() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      dateInput.min = `${year}-${month}-${day}`;

      // 수정 모드일 경우 기존 데이터 자동 세팅
      {% if ticket %}
      homeSelect.value = "{{ ticket.Hometeam_name }}";
      homeSelect.dispatchEvent(new Event('change'));

      subSelect.value = "{{ ticket.sub_category }}";
      subSelect.dispatchEvent(new Event('change'));

      awaySelect.value = "{{ ticket.awayteam_name }}";
      awaySelect.dispatchEvent(new Event('change'));

      dateInput.value = "{{ ticket.game_date.strftime('%Y-%m-%d') }}";
      dateInput.dispatchEvent(new Event('change'));

      hourSelect.value = "{{ ticket.game_date.strftime('%H') }}";
      minuteSelect.value = "{{ ticket.game_date.strftime('%M') }}";
      hourSelect.dispatchEvent(new Event('change'));

      gradeSelect.value = "{{ ticket.seat_grade }}";
      gradeSelect.dispatchEvent(new Event('change'));

      document.getElementById('seat_detail').value = "{{ ticket.seat }}";
      document.getElementById('pin_number').value = "{{ ticket.pin }}";
      document.getElementById('quantity').value = "{{ ticket.quantity }}";
      document.getElementById('price').value = "{{ ticket.price }}";

      // 세팅 후 프리뷰 영역 수동 업데이트 트리거
      document.getElementById('seat_detail').dispatchEvent(new Event('input'));
      document.getElementById('price').dispatchEvent(new Event('input'));
      {% endif %}
  });

  ticketForm.addEventListener('input', function(e) {
      if(e.target.id === 'seat_detail') document.getElementById('pv-seat').textContent = e.target.value || "상세위치";
      if(e.target.id === 'quantity') document.getElementById('pv-qty').textContent = e.target.value + '매';

      // 가격 계산 (수량 * 가격)
      if(e.target.id === 'price' || e.target.id === 'quantity') {
          const qty = document.getElementById('quantity').value || 0;
          const price = document.getElementById('price').value || 0;
          const totalPrice = qty * price;
          document.getElementById('pv-price').textContent = totalPrice.toLocaleString() + '원';
      }
  });
</script>
{% endblock %}
